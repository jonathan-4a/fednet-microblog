events {
    worker_connections 1024;
}

http {
    upstream instance1_upstream {
        server instance1:80;
        keepalive 8;
    }

    upstream instance2 {
        server instance2:80;
        keepalive 8;
    }

    upstream instance3 {
        server instance3:80;
        keepalive 8;
    }

    # Default server for any unmatched host (e.g. localhost)
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://instance1_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Instance 1 - instance1
    server {
        listen 80;
        server_name instance1;

        location / {
            proxy_pass http://instance1_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Instance 2 - instance2
    server {
        listen 80;
        server_name instance2;

        location / {
            proxy_pass http://instance2;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Instance 3 - instance3
    server {
        listen 80;
        server_name instance3;

        location / {
            proxy_pass http://instance3;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}


